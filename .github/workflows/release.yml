name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: emacs-jieba-rs-release
  cancel-in-progress: false
  queue: max

env:
  GITHUB_API_VERSION: "2026-03-10"
  RELEASE_PLATFORM: x86_64-unknown-linux-gnu
  RUST_TOOLCHAIN: "1.88.0"

jobs:
  identify:
    name: Identify release
    if: >-
      github.repository == 'brsvh/emacs-jieba-rs' &&
      github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read

    outputs:
      release_version: ${{ steps.release.outputs.release_version }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release source
        shell: bash
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git fetch --force --no-tags origin \
            refs/heads/main:refs/remotes/origin/main

          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          git merge-base --is-ancestor \
            "$RELEASE_SHA" refs/remotes/origin/main

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.7
        with:
          github_access_token: ${{ github.token }}

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v7.0.2
        with:
          primary-key: >-
            emacs-jieba-rs-nix-${{ runner.os }}-identify-${{
              hashFiles('**/*.nix', '**/flake.lock')
            }}
          restore-prefixes-first-match: |
            emacs-jieba-rs-nix-${{ runner.os }}-identify-
            emacs-jieba-rs-nix-${{ runner.os }}-
          save: false

      - name: Identify and validate version
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            printf 'Invalid release tag: %s\n' "$RELEASE_TAG" >&2
            exit 1
          fi
          release_version="${RELEASE_TAG#v}"

          cargo_version="$(
            nix eval --raw --impure --expr \
              '(builtins.fromTOML (builtins.readFile ./Cargo.toml)).package.version'
          )"
          cargo_rust_version="$(
            nix eval --raw --impure --expr \
              '(builtins.fromTOML (builtins.readFile ./Cargo.toml)).package.rust-version'
          )"
          if test "$RUST_TOOLCHAIN" != "${cargo_rust_version}.0"; then
            printf 'Rust toolchain mismatch: workflow=%s, Cargo=%s\n' \
              "$RUST_TOOLCHAIN" "$cargo_rust_version" >&2
            exit 1
          fi

          mapfile -t lisp_versions < <(
            sed -n \
              's/^;; Version:[[:space:]]*\([^[:space:]]\+\)[[:space:]]*$/\1/p' \
              lisp/jieba-rs.el
          )
          if test "${#lisp_versions[@]}" -ne 1; then
            printf 'Expected exactly one Lisp Version header\n' >&2
            exit 1
          fi
          lisp_version="${lisp_versions[0]}"

          make_version="$(
            nix shell --inputs-from . \
              nixpkgs#emacs30 \
              nixpkgs#gnumake \
              nixpkgs#jq \
              --command make --silent release-version
          )"

          nix_version="$(
            nix eval --raw .#jieba-rs.version
          )"

          for actual in \
            "$cargo_version" \
            "$lisp_version" \
            "$make_version" \
            "$nix_version"; do
            if test "$actual" != "$release_version"; then
              printf 'Release version mismatch: tag=%s, actual=%s\n' \
                "$release_version" "$actual" >&2
              exit 1
            fi
          done

          printf 'release_version=%s\n' "$release_version" \
            >> "$GITHUB_OUTPUT"

  check:
    name: Verify / ${{ matrix.check }}
    needs: identify
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        check:
          - flake
          - cargo-test
          - ERT
          - byte-compilation
          - checkdoc

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.7
        with:
          github_access_token: ${{ github.token }}

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v7.0.2
        with:
          primary-key: >-
            emacs-jieba-rs-nix-${{ runner.os }}-${{ matrix.check }}-${{
              hashFiles(
                '**/*.nix',
                '**/flake.lock',
                'Cargo.toml',
                'Cargo.lock',
                'src/**',
                'lisp/**/*.el',
                'tests/**'
              )
            }}
          restore-prefixes-first-match: |
            emacs-jieba-rs-nix-${{ runner.os }}-${{ matrix.check }}-
            emacs-jieba-rs-nix-${{ runner.os }}-
          save: true

      - name: Run ${{ matrix.check }}
        shell: bash
        env:
          CHECK: ${{ matrix.check }}
        run: |
          set -euo pipefail
          status=0

          run_check() {
            if ! "$@"; then
              status=1
            fi
          }

          case "$CHECK" in
            flake)
              run_check nix flake check --all-systems
              # Agent skill fixtures are not project release sources.
              mapfile -d '' -t format_sources < <(
                git ls-files -z -- \
                  '*.nix' \
                  '*.rs' \
                  '*.el' \
                  '*.md' \
                  Makefile \
                  ':(exclude).agents/**'
              )
              if test "${#format_sources[@]}" -eq 0; then
                printf 'No project format sources found\n' >&2
                status=1
              else
                run_check nix fmt -- --fail-on-change \
                  "${format_sources[@]}"
              fi
              run_check \
                nix shell --inputs-from . \
                  nixpkgs#actionlint \
                  nixpkgs#shellcheck \
                  --command actionlint \
                    -ignore 'unexpected key "queue"' \
                    .github/workflows/*.yml
              ;;
            cargo-test)
              run_check nix build \
                .#jieba-rs-module --print-build-logs
              ;;
            ERT)
              run_check nix run .#emacs30-run-jieba-rs-tests
              run_check nix run .#emacs31-run-jieba-rs-tests
              ;;
            byte-compilation)
              run_check nix run \
                .#emacs30-byte-compile-jieba-rs
              run_check nix run \
                .#emacs31-byte-compile-jieba-rs
              ;;
            checkdoc)
              run_check nix run .#emacs30-checkdoc-jieba-rs
              run_check nix run .#emacs31-checkdoc-jieba-rs
              ;;
            *)
              printf 'Unknown check: %s\n' "$CHECK" >&2
              status=1
              ;;
          esac

          exit "$status"

  build:
    name: Build release
    needs:
      - identify
      - check
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      RELEASE_VERSION: ${{ needs.identify.outputs.release_version }}

    permissions:
      contents: read

    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.7
        with:
          github_access_token: ${{ github.token }}

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v7.0.2
        with:
          primary-key: >-
            emacs-jieba-rs-nix-${{ runner.os }}-release-build-${{
              hashFiles('**/*.nix', '**/flake.lock')
            }}
          restore-prefixes-first-match: |
            emacs-jieba-rs-nix-${{ runner.os }}-release-build-
            emacs-jieba-rs-nix-${{ runner.os }}-
          save: false

      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail

          rustup toolchain install "$RUST_TOOLCHAIN" \
            --profile minimal \
            --no-self-update

      - name: Build reproducible package archive
        shell: bash
        run: |
          set -euo pipefail

          test "$(uname -m)" = x86_64

          release_shell=(
            nix shell --inputs-from .
            nixpkgs#coreutils
            nixpkgs#emacs30
            nixpkgs#findutils
            nixpkgs#gnumake
            nixpkgs#gnutar
            nixpkgs#jq
            --command
          )

          system_cargo="$(
            rustup which --toolchain "$RUST_TOOLCHAIN" cargo
          )"
          system_rustc="$(
            rustup which --toolchain "$RUST_TOOLCHAIN" rustc
          )"
          system_cc="$(command -v cc)"
          for tool in "$system_cargo" "$system_rustc" "$system_cc"; do
            resolved_tool="$(realpath "$tool")"
            case "$resolved_tool" in
              /nix/store/*)
                printf 'Release compiler must be runner-provided: %s\n' \
                  "$resolved_tool" >&2
                exit 1
                ;;
            esac
          done
          "$system_cargo" --version --verbose
          "$system_rustc" --version --verbose
          "$system_cc" --version
          rust_host="$(
            "$system_rustc" --version --verbose \
              | sed -n 's/^host: //p'
          )"
          if test "$rust_host" != "$RELEASE_PLATFORM"; then
            printf 'Rust host mismatch: expected %s, got %s\n' \
              "$RELEASE_PLATFORM" "$rust_host" >&2
            exit 1
          fi

          first_target="$(mktemp -d)"
          second_target="$(mktemp -d)"
          first_output="$(mktemp -d)"
          audit_dir="$(mktemp -d)"
          cleanup() {
            rm -rf \
              "$first_target" \
              "$second_target" \
              "$first_output" \
              "$audit_dir"
          }
          trap cleanup EXIT HUP INT TERM

          CARGO="$system_cargo" \
            RUSTC="$system_rustc" \
            CC="$system_cc" \
            "${release_shell[@]}" make clean
          CARGO="$system_cargo" \
            RUSTC="$system_rustc" \
            CC="$system_cc" \
            CARGO_TARGET_DIR="$first_target" \
            CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER="$system_cc" \
            SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)" \
            CARGO_INCREMENTAL=0 \
            "${release_shell[@]}" make release-archive
          first_archive="$(
            CARGO="$system_cargo" \
              RUSTC="$system_rustc" \
              CC="$system_cc" \
              CARGO_TARGET_DIR="$first_target" \
              "${release_shell[@]}" make --silent release-artifact
          )"
          test -f "$first_archive"
          CARGO="$system_cargo" \
            RUSTC="$system_rustc" \
            CC="$system_cc" \
            CARGO_TARGET_DIR="$first_target" \
            "${release_shell[@]}" make check-release-archive
          cp "$first_archive" "$first_output/archive.tar"
          sha256sum lisp/jieba-rs-module.so \
            > "$first_output/module.sha256"

          CARGO="$system_cargo" \
            RUSTC="$system_rustc" \
            CC="$system_cc" \
            "${release_shell[@]}" make clean
          CARGO="$system_cargo" \
            RUSTC="$system_rustc" \
            CC="$system_cc" \
            CARGO_TARGET_DIR="$second_target" \
            CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER="$system_cc" \
            SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)" \
            CARGO_INCREMENTAL=0 \
            "${release_shell[@]}" make release-archive
          archive="$(
            CARGO="$system_cargo" \
              RUSTC="$system_rustc" \
              CC="$system_cc" \
              CARGO_TARGET_DIR="$second_target" \
              "${release_shell[@]}" make --silent release-artifact
          )"
          test -f "$archive"
          CARGO="$system_cargo" \
            RUSTC="$system_rustc" \
            CC="$system_cc" \
            CARGO_TARGET_DIR="$second_target" \
            "${release_shell[@]}" make check-release-archive

          cmp "$first_output/archive.tar" "$archive"
          sha256sum --check --strict \
            "$first_output/module.sha256"

          test "$(
            CARGO="$system_cargo" \
              RUSTC="$system_rustc" \
              CC="$system_cc" \
              "${release_shell[@]}" make --silent release-version
          )" = "$RELEASE_VERSION"
          test "$(basename "$archive")" \
            = "jieba-rs-${RELEASE_VERSION}.tar"

          tar -xf "$archive" -C "$audit_dir"
          module="$audit_dir/jieba-rs-${RELEASE_VERSION}/jieba-rs-module.so"
          test -f "$module"

          file_output="$(file -b "$module")"
          if [[ "$file_output" != *"ELF 64-bit LSB shared object"* \
            || "$file_output" != *"x86-64"* ]]; then
            printf 'Unexpected release module format: %s\n' \
              "$file_output" >&2
            exit 1
          fi
          dynamic_section="$(readelf -d "$module")"
          if grep -Eq '(RPATH|RUNPATH)' <<<"$dynamic_section"; then
            printf 'Release module contains RPATH or RUNPATH\n' >&2
            exit 1
          fi
          if grep -aFq '/nix/store/' "$module"; then
            printf 'Release module contains a Nix store reference\n' >&2
            exit 1
          fi
          ldd_output="$(ldd "$module")"
          printf '%s\n' "$ldd_output"
          if grep -Fq 'not found' <<<"$ldd_output"; then
            printf 'Release module has an unresolved dependency\n' >&2
            exit 1
          fi

          mkdir -p release-input
          realpath "$archive" > release-input/archive-path
          sha256sum "$archive" > release-input/archive.sha256
          sha256sum lisp/jieba-rs-module.so \
            > release-input/module.sha256

      - name: Verify package installation and segmentation
        shell: bash
        run: |
          set -euo pipefail

          archive="$(cat release-input/archive-path)"
          test -f "$archive"

          verify_install() {
            local emacs_attr=$1
            local test_root

            test_root="$(mktemp -d)"
            mkdir -p "$test_root/init"
            PACKAGE_ARCHIVE="$archive" \
            PACKAGE_USER_DIR="$test_root/packages" \
            PACKAGE_VERSION="$RELEASE_VERSION" \
              nix shell --inputs-from . \
                "nixpkgs#${emacs_attr}" \
                --command emacs --batch \
                  --init-directory "$test_root/init" \
                  --eval '(progn
                    (require (quote package))
                    (setq package-enable-at-startup nil
                          package-user-dir
                          (getenv "PACKAGE_USER_DIR"))
                    (package-initialize)
                    (package-install-file (getenv "PACKAGE_ARCHIVE"))
                    (package-activate (quote jieba-rs))
                    (let* ((entry (assq (quote jieba-rs) package-alist))
                           (description (cadr entry))
                           (version
                            (and description
                                 (package-version-join
                                  (package-desc-version description)))))
                      (unless (equal version (getenv "PACKAGE_VERSION"))
                        (error "Installed package version mismatch: %S"
                               version)))
                    (require (quote jieba-rs))
                    (require (quote jieba-rs-module))
                    (let ((words
                           (jieba-rs-module-segment
                            "我们中出了一个叛徒" nil)))
                      (unless
                          (equal words
                                 ["我们" "中" "出" "了" "一个" "叛徒"])
                        (error "Unexpected segmentation result: %S"
                               words))))'
            rm -rf "$test_root"
          }

          verify_install emacs30
          verify_install emacs31

      - name: Prepare release handoff
        shell: bash
        env:
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          archive="$(cat release-input/archive-path)"
          asset="$(basename "$archive")"
          archive_sha256="$(cut -d ' ' -f 1 release-input/archive.sha256)"
          module_sha256="$(cut -d ' ' -f 1 release-input/module.sha256)"

          mkdir -p release-handoff/assets
          cp "$archive" "release-handoff/assets/$asset"

          # shellcheck disable=SC2016
          jq -n \
            --arg tag "$RELEASE_TAG" \
            --arg commit "$RELEASE_SHA" \
            --arg version "$RELEASE_VERSION" \
            --arg platform "$RELEASE_PLATFORM" \
            --arg rust_toolchain "$RUST_TOOLCHAIN" \
            --arg asset "$asset" \
            --arg archive_sha256 "$archive_sha256" \
            --arg module_sha256 "$module_sha256" \
            '{
              schema: 1,
              tag: $tag,
              commit: $commit,
              package: {
                name: "jieba-rs",
                version: $version,
                platform: $platform,
                asset: $asset,
                sha256: $archive_sha256
              },
              module: {
                name: "jieba-rs-module",
                version: $version,
                platform: $platform,
                rust_toolchain: $rust_toolchain,
                archive_member:
                  ("jieba-rs-" + $version + "/jieba-rs-module.so"),
                sha256: $module_sha256
              }
            }' > release-handoff/assets/manifest.json

          # shellcheck disable=SC2016
          jq -n \
            --arg tag "$RELEASE_TAG" \
            --arg commit "$RELEASE_SHA" \
            --arg version "$RELEASE_VERSION" \
            --arg platform "$RELEASE_PLATFORM" \
            --arg rust_toolchain "$RUST_TOOLCHAIN" \
            --arg asset "$asset" \
            --arg sha256 "$archive_sha256" \
            '{
              schema: 1,
              tag: $tag,
              commit: $commit,
              version: $version,
              platform: $platform,
              rust_toolchain: $rust_toolchain,
              asset: $asset,
              sha256: $sha256
            }' > release-handoff/plan.json

          # The backticks below are literal Markdown delimiters.
          # shellcheck disable=SC2016
          {
            printf '# Release %s\n\n' "$RELEASE_TAG"
            printf 'Repository snapshot `%s` at `%s`.\n\n' \
              "$RELEASE_TAG" "$RELEASE_SHA"
            printf 'This release publishes `jieba-rs` version `%s` for `%s`.\n\n' \
              "$RELEASE_VERSION" "$RELEASE_PLATFORM"
            printf 'The Emacs package archive contains the Rust dynamic module '
            printf '`jieba-rs-module.so` at the same version.\n\n'
            printf 'The module is built with Rust `%s` on Ubuntu 24.04.\n\n' \
              "$RUST_TOOLCHAIN"
            printf '| Asset | SHA-256 |\n'
            printf '| --- | --- |\n'
            printf '| `%s` | `%s` |\n' "$asset" "$archive_sha256"
          } > release-handoff/release-notes.md

          printf '%s\n' "$asset" manifest.json \
            | sort > release-handoff/expected-assets.txt

      - name: Upload verified handoff
        id: upload
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-handoff/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    name: Publish release
    needs: build
    if: >-
      github.repository == 'brsvh/emacs-jieba-rs' &&
      github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: write

    environment:
      name: release

    steps:
      - name: Download verified handoff
        uses: actions/download-artifact@v8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}
          path: release-handoff
          digest-mismatch: error

      - name: Validate verified handoff
        shell: bash
        env:
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          test -f release-handoff/plan.json
          test -f release-handoff/release-notes.md
          test -f release-handoff/expected-assets.txt
          test -d release-handoff/assets

          jq -e \
            --arg tag "$RELEASE_TAG" \
            --arg commit "$RELEASE_SHA" \
            --arg platform "$RELEASE_PLATFORM" \
            --arg rust_toolchain "$RUST_TOOLCHAIN" \
            '(
              .schema == 1 and
              .tag == $tag and
              .tag == ("v" + .version) and
              .commit == $commit and
              .platform == $platform and
              .rust_toolchain == $rust_toolchain and
              (.version |
               test("^(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)$")) and
              .asset == ("jieba-rs-" + .version + ".tar") and
              (.sha256 | test("^[0-9a-f]{64}$"))
            )' release-handoff/plan.json

          version="$(jq -r '.version' release-handoff/plan.json)"
          asset="$(jq -r '.asset' release-handoff/plan.json)"
          expected_sha256="$(jq -r '.sha256' release-handoff/plan.json)"

          jq -e \
            --arg tag "$RELEASE_TAG" \
            --arg commit "$RELEASE_SHA" \
            --arg version "$version" \
            --arg platform "$RELEASE_PLATFORM" \
            --arg rust_toolchain "$RUST_TOOLCHAIN" \
            --arg asset "$asset" \
            --arg sha256 "$expected_sha256" \
            '(
              .schema == 1 and
              .tag == $tag and
              .commit == $commit and
              .package.name == "jieba-rs" and
              .package.version == $version and
              .package.platform == $platform and
              .package.asset == $asset and
              .package.sha256 == $sha256 and
              .module.name == "jieba-rs-module" and
              .module.version == $version and
              .module.platform == $platform and
              .module.rust_toolchain == $rust_toolchain and
              .module.archive_member ==
                ("jieba-rs-" + $version + "/jieba-rs-module.so") and
              (.module.sha256 | test("^[0-9a-f]{64}$"))
            )' release-handoff/assets/manifest.json

          actual_sha256="$(
            sha256sum "release-handoff/assets/${asset}" \
              | cut -d ' ' -f 1
          )"
          test "$actual_sha256" = "$expected_sha256"

          expected_module_sha256="$(
            jq -r '.module.sha256' \
              release-handoff/assets/manifest.json
          )"
          extract_dir="$(mktemp -d)"
          package_dir="jieba-rs-${version}"
          {
            printf '%s/\n' "$package_dir"
            printf '%s/COPYING\n' "$package_dir"
            printf '%s/jieba-rs.el\n' "$package_dir"
            printf '%s/jieba-rs-pkg.el\n' "$package_dir"
            printf '%s/jieba-rs-module.so\n' "$package_dir"
          } | sort > "$extract_dir/expected-members"
          tar -tf "release-handoff/assets/${asset}" \
            | sort > "$extract_dir/actual-members"
          cmp \
            "$extract_dir/expected-members" \
            "$extract_dir/actual-members"
          member_types="$(
            LC_ALL=C tar -tvf "release-handoff/assets/${asset}" \
              | cut -c 1 \
              | tr -d '\n'
          )"
          test "$member_types" = 'd----'
          tar \
            --extract \
            --file "release-handoff/assets/${asset}" \
            --directory "$extract_dir" \
            --no-same-owner \
            --no-same-permissions
          actual_module_sha256="$(
            sha256sum \
              "$extract_dir/${package_dir}/jieba-rs-module.so" \
              | cut -d ' ' -f 1
          )"
          rm -rf "$extract_dir"
          test "$actual_module_sha256" = "$expected_module_sha256"

          sort --check release-handoff/expected-assets.txt
          test -z "$(
            sort release-handoff/expected-assets.txt \
              | uniq --repeated
          )"

          while IFS= read -r name; do
            if [[ ! "$name" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
              printf 'Unsafe release asset name: %s\n' "$name" >&2
              exit 1
            fi
          done < release-handoff/expected-assets.txt

          test -z "$(
            find release-handoff/assets \
              -mindepth 1 -maxdepth 1 ! -type f -print -quit
          )"
          find release-handoff/assets \
            -mindepth 1 -maxdepth 1 -type f -printf '%f\n' \
            | sort > release-handoff/actual-assets.txt
          cmp \
            release-handoff/expected-assets.txt \
            release-handoff/actual-assets.txt

      - name: Check immutable releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.IMMUTABLE_RELEASES_TOKEN }}
        run: |
          set -euo pipefail

          test -n "$GH_TOKEN"
          gh api \
            -H "X-GitHub-Api-Version: ${GITHUB_API_VERSION}" \
            "repos/${GITHUB_REPOSITORY}/immutable-releases" \
            | jq -e '.enabled == true'

      - name: Publish or resume immutable release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          api() {
            gh api \
              -H "X-GitHub-Api-Version: ${GITHUB_API_VERSION}" \
              "$@"
          }

          # An update without tag_name detaches a draft as untagged-*.
          # Recover only a unique Actions-owned placeholder.
          release_for_tag() {
            api --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              | jq --arg tag "$RELEASE_TAG" '
                  . as $pages |
                  [$pages[][] | select(.tag_name == $tag)] as $tagged |
                  if ($tagged | length) == 1 then
                    $tagged[0]
                  elif ($tagged | length) > 1 then
                    error("multiple releases found for tag")
                  else
                    [$pages[][] |
                     select(
                       .draft == true and
                       .immutable == false and
                       .published_at == null and
                       .name == $tag and
                       (.tag_name |
                        test("^untagged-[0-9a-f]+$")) and
                       .author.login == "github-actions[bot]" and
                       .author.id == 41898282 and
                       .author.type == "Bot"
                     )] as $untagged |
                    if ($untagged | length) == 1 then
                      $untagged[0]
                    elif ($untagged | length) == 0 then
                      null
                    else
                      error("multiple recoverable untagged drafts found")
                    end
                  end
                '
          }

          release_by_id() {
            local release_id=$1

            api "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          }

          release_tag_index_matches() {
            local release_id=$1
            local indexed_release
            local status

            indexed_release="$(mktemp)"
            if release_for_tag > "$indexed_release" \
              && jq -e \
                --arg tag "$RELEASE_TAG" \
                --argjson release_id "$release_id" \
                '.id == $release_id and .tag_name == $tag' \
                "$indexed_release" >/dev/null; then
              status=0
            else
              status=1
            fi
            rm -f "$indexed_release"
            return "$status"
          }

          verify_release_tag() {
            local tag_sha

            tag_sha="$(
              api "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}" \
                | jq -er '.sha'
            )"
            if test "$tag_sha" != "$RELEASE_SHA"; then
              printf 'Release tag moved: %s != %s\n' \
                "$tag_sha" "$RELEASE_SHA" >&2
              return 1
            fi
          }

          asset_digest_from_release() {
            local release_file=$1
            local name=$2
            local release_id
            local digest
            local assets_file

            digest="$(
              jq -r --arg name "$name" \
                '.assets[]? | select(.name == $name) | .digest // empty' \
                "$release_file"
            )"
            if test -z "$digest"; then
              release_id="$(jq -r '.id' "$release_file")"
              assets_file="$(mktemp)"
              api \
                "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" \
                > "$assets_file"
              digest="$(
                jq -r --arg name "$name" \
                  '.[] | select(.name == $name) | .digest // empty' \
                  "$assets_file"
              )"
              rm -f "$assets_file"
            fi
            if test -z "$digest"; then
              printf 'Missing GitHub digest for asset: %s\n' "$name" >&2
              exit 1
            fi
            printf '%s\n' "$digest"
          }

          verify_github_asset_digest() {
            local release_file=$1
            local name=$2
            local path=$3
            local expected
            local actual

            expected="sha256:$(sha256sum "$path" | cut -d ' ' -f 1)"
            actual="$(asset_digest_from_release "$release_file" "$name")"
            if test "$actual" != "$expected"; then
              printf 'GitHub digest mismatch for %s: %s != %s\n' \
                "$name" "$actual" "$expected" >&2
              exit 1
            fi
          }

          release_is_owned_draft() {
            local release_file=$1

            jq -e \
              --arg tag "$RELEASE_TAG" \
              --arg release_sha "$RELEASE_SHA" \
              --rawfile expected_assets \
                release-handoff/expected-assets.txt \
              --rawfile expected_body release-handoff/release-notes.md '
              def actions_bot:
                .login == "github-actions[bot]" and
                .id == 41898282 and
                .type == "Bot";
              def normalized_body:
                . as $draft_body |
                (capture(
                   "Repository snapshot `" + $tag +
                   "` at `(?<commit>[0-9a-f]{40})`\\."
                 ).commit) as $commit |
                ($draft_body | gsub($commit; $release_sha));
              ($expected_assets |
               split("\n") |
               map(select(length > 0))) as $expected_names |
              .draft == true and
              .immutable == false and
              .prerelease == false and
              .published_at == null and
              (.author | actions_bot) and
              (.tag_name == $tag or
               ((.tag_name | test("^untagged-[0-9a-f]+$")) and
                .name == $tag)) and
              (try ((.body | normalized_body) == $expected_body)
               catch false) and
              (.assets | type == "array") and
              (([.assets[]?.name] | length) ==
               ([.assets[]?.name] | unique | length)) and
              (.tag_name == $tag or
               all(.assets[]?; .state == "uploaded")) and
              all(.assets[]?;
                  (.uploader | actions_bot) and
                  (.name as $name |
                   ($expected_names | index($name)) != null))
            ' "$release_file" >/dev/null
          }

          release_metadata_matches() {
            local release_file=$1

            jq -e \
              --arg tag "$RELEASE_TAG" \
              --rawfile body release-handoff/release-notes.md \
              '(.tag_name == $tag and
                .name == $tag and
                .body == $body and
                .prerelease == false)' \
              "$release_file" >/dev/null
          }

          verify_release_metadata() {
            local release_file=$1

            if ! release_metadata_matches "$release_file"; then
              jq -r \
                --arg tag "$RELEASE_TAG" \
                --rawfile body release-handoff/release-notes.md '
                "Release metadata mismatch: " +
                "tag_name=\(.tag_name | @json), " +
                "name=\(.name | @json), " +
                "expected_tag=\($tag | @json), " +
                "body_matches=\(.body == $body), " +
                "prerelease=\(.prerelease)"
              ' "$release_file" >&2
              return 1
            fi
          }

          release_assets_match() {
            local release_file=$1
            local name
            local expected
            local actual

            while IFS= read -r name; do
              expected="sha256:$(
                sha256sum "release-handoff/assets/${name}" \
                  | cut -d ' ' -f 1
              )"
              actual="$(
                jq -r --arg name "$name" \
                  '[.assets[]? | select(.name == $name)] |
                   if length == 1 and .[0].state == "uploaded" then
                     .[0].digest // empty
                   else
                     empty
                   end' \
                  "$release_file"
              )"
              if test "$actual" != "$expected"; then
                return 1
              fi
            done < release-handoff/expected-assets.txt
          }

          verify_release_tag

          release_json=release-handoff/release.json
          release_for_tag > "$release_json"
          if jq -e 'type == "object"' "$release_json" >/dev/null; then
            :
          else
            jq -n \
              --arg tag "$RELEASE_TAG" \
              --arg target "$RELEASE_SHA" \
              --rawfile body release-handoff/release-notes.md \
              '{
                tag_name: $tag,
                target_commitish: $target,
                name: $tag,
                body: $body,
                draft: true
              }' > release-handoff/create-release.json
            api --method POST \
              --input release-handoff/create-release.json \
              "repos/${GITHUB_REPOSITORY}/releases" \
              > "$release_json"
          fi

          # A new draft may not appear in the release list immediately.
          # Refresh it by its stable ID after the initial lookup or creation.
          release_id="$(
            jq -er '.id | select(type == "number")' "$release_json"
          )"
          release_by_id "$release_id" > "$release_json"
          verify_release_tag
          if jq -e '.draft == true' "$release_json" >/dev/null; then
            release_is_owned_draft "$release_json"
            # Every release update must preserve the tag explicitly.
            jq -n \
              --arg tag "$RELEASE_TAG" \
              --arg target "$RELEASE_SHA" \
              --rawfile body release-handoff/release-notes.md \
              '{
                tag_name: $tag,
                target_commitish: $target,
                name: $tag,
                body: $body,
                draft: true,
                prerelease: false
              }' > release-handoff/update-release.json
            api --method PATCH \
              --input release-handoff/update-release.json \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              > "$release_json"
            for _attempt in 1 2 3 4 5; do
              release_by_id "$release_id" > "$release_json"
              if release_is_owned_draft "$release_json" \
                && release_metadata_matches "$release_json" \
                && release_tag_index_matches "$release_id"; then
                break
              fi
              sleep 2
            done
            release_is_owned_draft "$release_json"
            verify_release_metadata "$release_json"
            if ! release_tag_index_matches "$release_id"; then
              printf 'Release tag index did not converge for ID: %s\n' \
                "$release_id" >&2
              exit 1
            fi
          else
            jq -e \
              --arg tag "$RELEASE_TAG" \
              '.tag_name == $tag and
               .draft == false and .immutable == true' \
              "$release_json"
          fi

          jq -r '.assets[]?.name' "$release_json" \
            | sort > release-handoff/remote-assets.txt
          while IFS= read -r name; do
            grep -Fqx "$name" release-handoff/expected-assets.txt || {
              printf 'Unexpected remote release asset: %s\n' "$name" >&2
              exit 1
            }
            expected_digest="sha256:$(
              sha256sum "release-handoff/assets/${name}" \
                | cut -d ' ' -f 1
            )"
            actual_digest="$(
              jq -r --arg name "$name" \
                '[.assets[]? | select(.name == $name)] |
                 if length == 1 and .[0].state == "uploaded" then
                   .[0].digest // empty
                 else
                   empty
                 end' \
                "$release_json"
            )"
            if test "$actual_digest" = "$expected_digest"; then
              rm -rf release-handoff/remote-asset
              mkdir release-handoff/remote-asset
              gh release download "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --pattern "$name" \
                --dir release-handoff/remote-asset
              cmp \
                "release-handoff/assets/${name}" \
                "release-handoff/remote-asset/${name}"
              verify_github_asset_digest \
                "$release_json" \
                "$name" \
                "release-handoff/assets/${name}"
            elif jq -e \
              --arg name "$name" \
              '([.assets[]? | select(.name == $name)]) as $assets |
               .draft == true and
               .immutable == false and
               .author.login == "github-actions[bot]" and
               .author.id == 41898282 and
               .author.type == "Bot" and
               ($assets | length == 1) and
               $assets[0].uploader.login == "github-actions[bot]" and
               $assets[0].uploader.id == 41898282 and
               $assets[0].uploader.type == "Bot"' \
              "$release_json" >/dev/null; then
              printf 'Replacing stale draft asset: %s\n' "$name"
              gh release upload "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --clobber \
                "release-handoff/assets/${name}"
            else
              printf 'Release asset differs and is not replaceable: %s\n' \
                "$name" >&2
              exit 1
            fi
          done < release-handoff/remote-assets.txt

          if jq -e '.draft == true' "$release_json" >/dev/null; then
            while IFS= read -r name; do
              if ! grep -Fqx \
                "$name" release-handoff/remote-assets.txt; then
                gh release upload "$RELEASE_TAG" \
                  --repo "$GITHUB_REPOSITORY" \
                  "release-handoff/assets/${name}"
              fi
            done < release-handoff/expected-assets.txt

            for _attempt in 1 2 3 4 5; do
              release_by_id "$release_id" > "$release_json"
              jq -r '.assets[]?.name' "$release_json" \
                | sort > release-handoff/remote-assets.txt
              if release_is_owned_draft "$release_json" \
                && release_metadata_matches "$release_json" \
                && cmp --silent \
                release-handoff/expected-assets.txt \
                release-handoff/remote-assets.txt \
                && release_assets_match "$release_json"; then
                break
              fi
              sleep 2
            done
            release_is_owned_draft "$release_json"
            verify_release_metadata "$release_json"
            cmp \
              release-handoff/expected-assets.txt \
              release-handoff/remote-assets.txt
            release_assets_match "$release_json"

            while IFS= read -r name; do
              verify_github_asset_digest \
                "$release_json" \
                "$name" \
                "release-handoff/assets/${name}"
            done < release-handoff/expected-assets.txt

            verify_release_tag

            jq -n \
              --arg tag "$RELEASE_TAG" \
              --arg target "$RELEASE_SHA" \
              --rawfile body release-handoff/release-notes.md \
              '{
                tag_name: $tag,
                target_commitish: $target,
                name: $tag,
                body: $body,
                draft: false,
                prerelease: false
              }' > release-handoff/publish-release.json
            api --method PATCH \
              --input release-handoff/publish-release.json \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              > "$release_json"
          fi

          for _attempt in 1 2 3 4 5; do
            release_by_id "$release_id" > "$release_json"
            jq -r '.assets[]?.name' "$release_json" \
              | sort > release-handoff/remote-assets.txt
            if release_metadata_matches "$release_json" \
              && cmp --silent \
                release-handoff/expected-assets.txt \
                release-handoff/remote-assets.txt \
              && release_assets_match "$release_json" \
              && jq -e \
                '.draft == false and .immutable == true' \
                "$release_json" >/dev/null; then
              break
            fi
            sleep 2
          done
          jq -e \
            '.draft == false and .immutable == true' \
            "$release_json"
          verify_release_metadata "$release_json"
          cmp \
            release-handoff/expected-assets.txt \
            release-handoff/remote-assets.txt
          release_assets_match "$release_json"

          rm -rf published-assets
          mkdir published-assets
          while IFS= read -r name; do
            gh release download "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$name" \
              --dir published-assets
            cmp \
              "release-handoff/assets/${name}" \
              "published-assets/${name}"
            verify_github_asset_digest \
              "$release_json" \
              "$name" \
              "published-assets/${name}"
          done < release-handoff/expected-assets.txt
